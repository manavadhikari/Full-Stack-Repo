<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 3 - Cart</title>

  <style>
    /* ── Reset ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }

    /* ── Navbar ── */
    .navbar {
      background-color: #2c3e50;
      color: white;
      padding: 15px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h1 {
      font-size: 22px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      background-color: #555;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
    }

    .navbar a:hover {
      background-color: #444;
    }

    /* ── Back Button ── */
    .back-btn {
      display: inline-block;
      margin: 20px 24px 10px 24px;
      padding: 8px 16px;
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #444;
    }

    .back-btn:hover {
      background-color: #eee;
    }

    /* ── Page Title ── */
    .page-title {
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
      padding: 0 24px 16px 24px;
    }

    /* ── Empty Cart Message ── */
    .empty-cart {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }

    .empty-cart .icon {
      font-size: 60px;
      margin-bottom: 16px;
    }

    .empty-cart p {
      font-size: 16px;
      margin-bottom: 16px;
    }

    .empty-cart a {
      display: inline-block;
      padding: 10px 22px;
      background-color: #2c3e50;
      color: white;
      text-decoration: none;
      border-radius: 7px;
    }

    /* ── Main Layout: Items + Summary side by side ── */
    .cart-layout {
      display: flex;
      gap: 24px;
      padding: 0 24px 40px 24px;
      flex-wrap: wrap;            /* stacks on small screens */
      align-items: flex-start;
    }

    /* ── LEFT: Cart Items ── */
    .cart-items {
      flex: 1;
      min-width: 280px;
    }

    /* ── Single Cart Item ── */
    .cart-item {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .cart-item img {
      width: 75px;
      height: 75px;
      object-fit: contain;
      background-color: #fafafa;
      border: 1px solid #eee;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .item-details {
      flex: 1;
    }

    .item-title {
      font-size: 15px;
      font-weight: bold;
      color: #222;
      margin-bottom: 4px;
    }

    .item-price {
      font-size: 14px;
      color: #e67e22;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* ── Quantity Controls ── */
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-btn {
      width: 30px;
      height: 30px;
      background-color: #eee;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      line-height: 1;
    }

    .qty-btn:hover {
      background-color: #ddd;
    }

    .qty-number {
      font-size: 16px;
      font-weight: bold;
      min-width: 24px;
      text-align: center;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 13px;
      cursor: pointer;
      margin-left: 10px;
    }

    .remove-btn:hover {
      text-decoration: underline;
    }

    /* ── Item subtotal (per item total) ── */
    .item-subtotal {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }

    /* ── RIGHT: Bill Summary ── */
    .bill-summary {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 22px;
      flex: 0 0 260px;            /* fixed width */
    }

    .bill-title {
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 18px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    /* ── Each row inside the bill ── */
    .bill-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
    }

    .bill-row.discount {
      color: #27ae60;
    }

    /* ── Dashed divider line ── */
    .bill-divider {
      border: none;
      border-top: 1px dashed #ccc;
      margin: 14px 0;
    }

    /* ── Total row ── */
    .bill-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
    }

    /* ── Savings note ── */
    .savings-note {
      margin-top: 10px;
      font-size: 12px;
      color: #27ae60;
      text-align: center;
    }

    /* ── Checkout Button ── */
    .checkout-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background-color: #e67e22;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .checkout-btn:hover {
      background-color: #d35400;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <h1>🛍 ShopEasy</h1>
    <a href="task1-listing.html">← Continue Shopping</a>
  </div>

  <!-- BACK BUTTON -->
  <button class="back-btn" onclick="window.location.href='task1-listing.html'">
    ← Continue Shopping
  </button>

  <!-- PAGE TITLE -->
  <div class="page-title" id="page-title"></div>

  <!-- MAIN CONTENT (filled by JavaScript) -->
  <div id="main-content"></div>


  <script>

    // ── Step 1: Read the cart from localStorage ──
    var cart = JSON.parse(localStorage.getItem("cart") || "[]");

    var mainContent = document.getElementById("main-content");
    var pageTitle   = document.getElementById("page-title");

    // ── Step 2: If cart is empty, show empty message ──
    if (cart.length === 0) {

      pageTitle.textContent = "Your Cart";

      mainContent.innerHTML = `
        <div class="empty-cart">
          <div class="icon">🛒</div>
          <p>Your cart is empty!</p>
          <a href="task1-listing.html">Browse Products</a>
        </div>
      `;

    } else {

      // ── Step 3: Cart has items — show them ──
      var totalItems = cart.reduce(function(sum, item) { return sum + item.qty; }, 0);
      pageTitle.textContent = "Your Cart (" + totalItems + " items)";

      // Build the two-column layout
      mainContent.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items" id="cart-items"></div>
          <div class="bill-summary" id="bill-summary"></div>
        </div>
      `;

      // ── Step 4: Render each cart item ──
      renderCartItems();
      renderBillSummary();
    }


    // ────────────────────────────────────────────
    //  FUNCTION: Render all cart items on the left
    // ────────────────────────────────────────────
    function renderCartItems() {
      var cartItemsDiv = document.getElementById("cart-items");
      cartItemsDiv.innerHTML = "";   // clear first

      cart.forEach(function(item, index) {
        var itemTotal = (item.price * item.qty).toFixed(2);

        // Create one item div
        var div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
          <img src="${item.thumbnail}" alt="${item.title}" />

          <div class="item-details">
            <div class="item-title">${item.title}</div>
            <div class="item-price">$${item.price.toFixed(2)} each</div>

            <!-- Quantity Controls -->
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
              <span class="qty-number">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${index}, +1)">+</button>
              <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
            </div>

            <div class="item-subtotal">Subtotal: $${itemTotal}</div>
          </div>
        `;

        cartItemsDiv.appendChild(div);
      });
    }


    // ────────────────────────────────────────────
    //  FUNCTION: Render the Bill Summary on the right
    // ────────────────────────────────────────────
    function renderBillSummary() {
      var billDiv = document.getElementById("bill-summary");

      // Calculate values
      var subtotal  = cart.reduce(function(sum, item) { return sum + item.price * item.qty; }, 0);
      var shipping  = 4.99;
      var discount  = subtotal > 100 ? subtotal * 0.05 : 0;   // 5% off if order > $100
      var total     = subtotal + shipping - discount;
      var itemCount = cart.reduce(function(sum, item) { return sum + item.qty; }, 0);

      // Build discount row HTML (only show if discount applies)
      var discountRow = "";
      if (discount > 0) {
        discountRow = `
          <div class="bill-row discount">
            <span>Discount (5% off)</span>
            <span>- $${discount.toFixed(2)}</span>
          </div>
        `;
      }

      // Build savings note
      var savingsNote = "";
      if (discount > 0) {
        savingsNote = `<div class="savings-note">🎉 You saved $${discount.toFixed(2)}!</div>`;
      }

      billDiv.innerHTML = `
        <div class="bill-title">🧾 Bill Summary</div>

        <div class="bill-row">
          <span>Items (${itemCount})</span>
          <span>$${subtotal.toFixed(2)}</span>
        </div>

        <div class="bill-row">
          <span>Shipping</span>
          <span>$${shipping.toFixed(2)}</span>
        </div>

        ${discountRow}

        <hr class="bill-divider" />

        <div class="bill-total">
          <span>Total</span>
          <span>$${total.toFixed(2)}</span>
        </div>

        ${savingsNote}

        <button class="checkout-btn" onclick="alert('Order placed! Thank you 🎉')">
          Proceed to Checkout
        </button>
      `;
    }


    // ────────────────────────────────────────────
    //  FUNCTION: Increase or decrease item quantity
    // ────────────────────────────────────────────
    function changeQty(index, delta) {
      cart[index].qty += delta;

      // If qty goes to 0 → remove the item
      if (cart[index].qty <= 0) {
        cart.splice(index, 1);
      }

      // Save updated cart
      localStorage.setItem("cart", JSON.stringify(cart));

      // If cart is now empty → reload page to show empty state
      if (cart.length === 0) {
        location.reload();
        return;
      }

      // Otherwise just re-render
      renderCartItems();
      renderBillSummary();

      // Update item count in page title
      var totalItems = cart.reduce(function(sum, item) { return sum + item.qty; }, 0);
      document.getElementById("page-title").textContent = "Your Cart (" + totalItems + " items)";
    }


    // ────────────────────────────────────────────
    //  FUNCTION: Remove an item completely
    // ────────────────────────────────────────────
    function removeItem(index) {
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));

      if (cart.length === 0) {
        location.reload();
        return;
      }

      renderCartItems();
      renderBillSummary();

      var totalItems = cart.reduce(function(sum, item) { return sum + item.qty; }, 0);
      document.getElementById("page-title").textContent = "Your Cart (" + totalItems + " items)";
    }

  </script>

</body>
</html>
